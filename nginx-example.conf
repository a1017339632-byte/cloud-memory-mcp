# Nginx reverse proxy config for Memory MCP
# Place in /etc/nginx/sites-available/memory-mcp
# Then: sudo ln -s /etc/nginx/sites-available/memory-mcp /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d mem.yourdomain.com

server {
    listen 80;
    listen 443 ssl;
    server_name mem.yourdomain.com;

    # SSL certs will be added by certbot automatically
    # ssl_certificate /etc/letsencrypt/live/mem.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mem.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
